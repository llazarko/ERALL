<!DOCTYPE html>
<html lang="sq">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERALL Luxury Fragrances</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/img.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500&display=swap"
        rel="stylesheet">
    <meta name="description"
        content="Shfleto koleksionin tonë të plotë të parfumeve luksoze të frymëzuara. Parfume për meshkuj, femra dhe unisex.">
</head>

<body>
    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Shop Page -->
    <main class="shop-page">
        <div class="container">
            <!-- Breadcrumbs -->
            <div class="breadcrumbs">
                <a href="index.html">Kryefaqja</a> >
                <span></span>Koleksioni <span>Ynë
            </div>

            <div class="shop-header">
                <div class="shop-stats">
                    <span id="product-count">0 Produkte</span>
                </div>
            </div>

            <!-- Shop Filter - Versioni i Përmirësuar -->
            <div class="filter-wrapper">
                <div class="filter-header" onclick="toggleFilterMenu()">
                    <span><i class="fas fa-filter"></i> Filtro produktet</span>
                    <i class="fas fa-chevron-down filter-arrow"></i>
                </div>
                <div class="shop-filter" id="shopFilterMenu">
                    <button class="filter-btn active" data-category="all">
                        <i class="fas fa-th-large"></i> Të Gjitha
                    </button>
                    <button class="filter-btn" data-category="meshkuj">
                        <i class="fas fa-mars"></i> Për Meshkuj
                    </button>
                    <button class="filter-btn" data-category="femra">
                        <i class="fas fa-venus"></i> Për Femra
                    </button>
                    <button class="filter-btn" data-category="unisex">
                        <i class="fas fa-genderless"></i> Unisex
                    </button>
                    <button class="filter-btn" data-category="set">
                        <i class="fas fa-box"></i> Set Parfumesh
                    </button>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="products-container">
                <!-- Produktet do të ngarkohen me JavaScript -->
            </div>

            <!-- No Products Message -->
            <div class="no-products" id="no-products" style="display: none;">
                <i class="fas fa-search" style="font-size: 3rem; color: var(--color-gold); margin-bottom: 1rem;"></i>
                <h3>Nuk u gjetën produkte</h3>
                <p>Provoni një kategori tjetër ose kthuni te të gjitha produktet.</p>
                <button class="btn btn-secondary" onclick="filterProducts('all')">Shiko Të Gjitha</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-header">
            <h3>Shporta Juaj</h3>
            <button class="cart-close" onclick="toggleCart()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be loaded here by JavaScript -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Totali:</span>
                <span class="cart-total-amount" id="cartTotal">0 Lekë</span>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="checkout()">Vazhdo me checkout</button>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        Produkti u shtua në shportë!
    </div>

    <script src="js/main.js"></script>
    <script src="js/products.js"></script>
    <script src="js/search.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/shop.js"></script>
    <script>
        // Ngarko komponentët
        loadComponent('navbar-container', 'components/navbar.html');
        loadComponent('footer-container', 'components/footer.html');

        // Ngarko produktet bazuar në URL
        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('category') || 'all';
            filterProducts(category);
            updateCartCount();
        });
    </script>
    <style>
        :root {
            --chat-dark: #0a0a0a;
            --chat-darker: #050505;
            --chat-gold: #D4AF37;
            --chat-gold-light: #e8c45e;
            --chat-beige: #e8e0d5;
            --chat-border: rgba(212, 175, 55, 0.2);
            --chat-glass: rgba(10, 10, 10, 0.95);
            --chat-white: #ffffff;
            --chat-gray: #888888;
        }

        /* Floating Button - z-index shumë i lartë */
        .chat-float-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--chat-gold) 0%, #b8942e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999999;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
            animation: pulse-glow 2s infinite;
        }

        .chat-float-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        .chat-float-btn i {
            font-size: 32px;
            color: #0a0a0a;
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(212, 175, 55, 0.4);
            }

            70% {
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 0 12px rgba(212, 175, 55, 0);
            }

            100% {
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(212, 175, 55, 0);
            }
        }

        /* Chat Widget - z-index më i lartë se gjithçka */
        .chat-widget {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 460px;
            height: 650px;
            max-height: 80vh;
            background: var(--chat-glass);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid var(--chat-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999999;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0);
            opacity: 0;
            transform-origin: bottom right;
            pointer-events: none;
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
        }

        .chat-widget.open {
            transform: scale(1);
            opacity: 1;
            pointer-events: all;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #0f0f0f 0%, #050505 100%);
            padding: 18px 20px;
            border-bottom: 1px solid var(--chat-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--chat-gold), #b8942e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-avatar i {
            font-size: 22px;
            color: #0a0a0a;
        }

        .chat-header-info h4 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--chat-gold);
            letter-spacing: 1px;
        }

        .chat-header-info p {
            margin: 3px 0 0;
            font-size: 0.7rem;
            color: var(--chat-beige);
            opacity: 0.7;
        }

        .api-status {
            font-size: 0.65rem;
            margin-top: 2px;
            color: #4CAF50;
        }

        /* Butoni Close - i rregulluar për klikueshmëri */
        .chat-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--chat-beige);
            font-size: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-close:hover {
            background: rgba(212, 175, 55, 0.3);
            color: var(--chat-gold);
            transform: rotate(90deg);
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--chat-gold);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            max-width: 95%;
            animation: fadeInUp 0.3s ease;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .bot .bubble {
            background: rgba(30, 30, 35, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 20px 20px 20px 4px;
            color: var(--chat-beige);
        }

        .user .bubble {
            background: linear-gradient(135deg, var(--chat-gold), #b8942e);
            color: #0a0a0a;
            border-radius: 20px 20px 4px 20px;
            font-weight: 500;
        }

        .message-time {
            font-size: 0.6rem;
            margin-top: 5px;
            opacity: 0.5;
            color: var(--chat-gray);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 16px;
            background: rgba(30, 30, 35, 0.9);
            border-radius: 20px;
            width: fit-content;
            border: 1px solid rgba(212, 175, 55, 0.25);
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--chat-gold);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Product Card */
        .chat-product-card {
            background: rgba(20, 20, 25, 0.98);
            border-radius: 16px;
            margin-top: 12px;
            margin-bottom: 8px;
            padding: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            gap: 12px;
            transition: 0.2s;
        }

        .chat-product-card:hover {
            transform: translateX(5px);
            border-color: var(--chat-gold);
        }

        .chat-product-card img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 10px;
            background: #1a1a1a;
        }

        .chat-product-info {
            flex: 1;
        }

        .chat-product-info h4 {
            margin: 0 0 4px;
            font-size: 0.9rem;
            color: var(--chat-gold);
        }

        .chat-product-info .brand {
            font-size: 0.7rem;
            color: var(--chat-beige);
            opacity: 0.7;
        }

        .chat-product-info .price {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--chat-white);
            margin: 5px 0;
        }

        .product-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            margin-right: 5px;
            margin-bottom: 4px;
            color: var(--chat-gold);
        }

        .product-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .chat-btn-sm {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--chat-gold);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--chat-gold);
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .chat-btn-sm:hover {
            background: var(--chat-gold);
            color: #0a0a0a;
        }

        .chat-btn-primary-sm {
            background: var(--chat-gold);
            border: none;
            color: #0a0a0a;
        }

        .chat-btn-primary-sm:hover {
            background: var(--chat-gold-light);
        }

        /* Quick Replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .quick-reply {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 6px 14px;
            border-radius: 25px;
            font-size: 0.7rem;
            color: var(--chat-gold);
            cursor: pointer;
            transition: 0.2s;
        }

        .quick-reply:hover {
            background: var(--chat-gold);
            color: #0a0a0a;
        }

        /* Input Area */
        .chat-input-area {
            padding: 15px 20px;
            background: rgba(10, 10, 10, 0.98);
            border-top: 1px solid var(--chat-border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(30, 30, 35, 0.9);
            border: 1px solid var(--chat-border);
            border-radius: 30px;
            padding: 12px 18px;
            color: var(--chat-white);
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
        }

        /* RREGULLIMI PËR MOBILE - parandalon zoom-in automatik */
        @media (max-width: 768px) {
            .chat-input-area input {
                font-size: 16px !important;
                /* 16px është minimumi për të shmangur zoom-in në iOS */
            }
        }

        .chat-input-area input:focus {
            border-color: var(--chat-gold);
        }

        .chat-send-btn {
            background: var(--chat-gold);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-send-btn i {
            color: #0a0a0a;
            font-size: 18px;
        }

        .chat-send-btn:hover {
            background: var(--chat-gold-light);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-widget {
                width: calc(100vw - 40px);
                max-width: 460px;
                height: 70vh;
                right: 20px;
                bottom: 90px;
            }
        }

        @media (max-width: 480px) {
            .chat-widget {
                width: calc(100vw - 30px);
                right: 15px;
                bottom: 85px;
            }

            .chat-float-btn {
                width: 55px;
                height: 55px;
                bottom: 20px;
                right: 20px;
            }

            .chat-float-btn i {
                font-size: 26px;
            }
        }
    </style>
    </head>

    <body>

ID: ${p.id} | Emri: ${p.name} | Brand: ${p.inspired} | Çmimi: ${p.price} Lekë | Nota: ${p.notes.join(', ')} | Longevity: ${p.longevity}% | Projeksioni: ${p.projection}% | Kategoria: ${p.categoryDisplay}`).join('\n');

                    let response = "🎯 **Rekomandimet e mia për ty** 🎯\n\n";
                    filtered.forEach((p, idx) => {
                        response += `**${idx + 1}. ${p.name}** [ID: ${p.id}] - ${p.price.toLocaleString()} Lekë\n`;
                        response += `- ${p.notes.slice(0, 2).join(', ')}. Longevity ${p.longevity}%.\n\n`;
                    });
                    response += `<<<PRODUCT_CARD>>>`;
                    return response;
                }

                // ============================================================
                // RREGULLI I RI: PA SCROLL AUTOMATIK + PARSIM I PLOTË I ID-ve
                // ============================================================
                let userScrolledManually = false;

                messagesContainer.addEventListener('scroll', () => {
                    userScrolledManually = true;
                });

                function addMessage(text, sender, productCardData = null) {
                    const messageObj = { text, sender, timestamp: new Date(), productCard: productCardData };
                    chatMessages.push(messageObj);

                    if (sender === 'user') {
                        chatHistory.push({ role: 'user', content: text });
                    } else if (sender === 'bot' && !productCardData && text && text.length > 0) {
                        // Ruaj vetëm përgjigjet pa kartela për historikun
                        chatHistory.push({ role: 'assistant', content: text.substring(0, 800) });
                    }

                    renderMessage(messageObj);
                }

                function renderMessage(msg) {
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender}`;
                    const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    let content = `<div class="bubble">${(msg.text || '').replace(/\n/g, '<br>')}</div>`;

                    if (msg.productCard) {
                        content += `
                    <div class="chat-product-card">
                        <img src="${msg.productCard.image || 'images/comingsoon.avif'}" onerror="this.src='images/comingsoon.avif'">
                        <div class="chat-product-info">
                            <h4>${msg.productCard.name}</h4>
                            <div class="brand">${msg.productCard.inspired || ''}</div>
                            <div class="price">${(msg.productCard.price || 0).toLocaleString()} Lekë</div>
                            <div class="product-card-actions">
                                <button class="chat-btn-sm" onclick="viewProduct(${msg.productCard.id})">🔍 Shiko</button>
                                <button class="chat-btn-sm chat-btn-primary-sm" onclick="addToCartFromChat(${msg.productCard.id})">🛒 Shto</button>
                            </div>
                        </div>
                    </div>
                `;
                    }

                    content += `<div class="message-time">${timeStr}</div>`;
                    div.innerHTML = content;
                    messagesContainer.appendChild(div);
                }

                function showTyping() {
                    if (isTyping) return;
                    isTyping = true;
                    const typingDiv = document.createElement('div');
                    typingDiv.className = 'message bot typing-message';
                    typingDiv.id = 'typingIndicator';
                    typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
                    messagesContainer.appendChild(typingDiv);
                }

                function hideTyping() {
                    const typingEl = document.getElementById('typingIndicator');
                    if (typingEl) typingEl.remove();
                    isTyping = false;
                }

                async function sendMessage() {
                    const text = chatInput.value.trim();
                    if (!text) return;

                    addMessage(text, 'user');
                    chatInput.value = '';

                    showTyping();

                    const apiResult = await callAIAPI(text, chatHistory.slice(-10));

                    hideTyping();

                    let aiResponseText = "";
                    if (apiResult.success && apiResult.response) {
                        aiResponseText = apiResult.response;
                    } else {
                        aiResponseText = getFallbackRecommendations(text);
                    }

                    // ========================================================
                    // PARSIM I PLOTË: Nxjerr të GJITHA ID-të nga përgjigja
                    // ========================================================
                    // 1. Nxjerr të gjitha ID-të duke kërkuar [ID: numri]
                    const allIds = [];
                    const idRegex = /\[ID:\s*(\d+)\]/gi;
                    let match;
                    while ((match = idRegex.exec(aiResponseText)) !== null) {
                        const id = parseInt(match[1]);
                        if (!allIds.includes(id)) {
                            allIds.push(id);
                        }
                    }

                    // 2. Nëse nuk ka ID, provo të kërkosh numra pas fjalës "ID" ose thjesht numra të izoluar?
                    if (allIds.length === 0) {
                        // Fallback: kërko çdo numër që mund të jetë ID (1-50)
                        const numRegex = /\b([1-9][0-9]?)\b/g;
                        while ((match = numRegex.exec(aiResponseText)) !== null) {
                            const id = parseInt(match[1]);
                            if (id >= 1 && id <= 50 && !allIds.includes(id)) {
                                allIds.push(id);
                            }
                        }
                    }

                    // 3. Përgatit tekstin pa ndarësit <<<PRODUCT_CARD>>>
                    let cleanText = aiResponseText.replace(/<<<PRODUCT_CARD>>>/g, '');
                    // Heq linjat e zbrazëta të tepërta
                    cleanText = cleanText.replace(/\n{3,}/g, '\n\n').trim();

                    // Shto tekstin e përgjigjes (pa kartelat)
                    if (cleanText) {
                        addMessage(cleanText, 'bot');
                    }

                    // 4. Shfaq kartelat për secilën ID unike
                    const products = getProductsData();
                    const addedProductIds = new Set(); // për të shmangur dublikatat në rast se e kemi shtuar tashmë

                    for (const productId of allIds) {
                        if (addedProductIds.has(productId)) continue;
                        const product = products.find(p => p.id === productId);
                        if (product) {
                            addMessage('', 'bot', product);
                            addedProductIds.add(productId);
                            await new Promise(r => setTimeout(r, 60)); // vonesë e lehtë për animacion
                        }
                    }

                    // Nëse nuk u gjet asnjë ID (asnjë kartelë), por përgjigja përmban tekst, mundohemi të gjejmë produkte të ngjashme sipas emrit
                    if (allIds.length === 0 && cleanText.length > 0) {
                        // Kërko emra produktesh në tekst
                        const productNames = products.map(p => p.name.toLowerCase());
                        let foundAny = false;
                        for (const product of products) {
                            if (cleanText.toLowerCase().includes(product.name.toLowerCase())) {
                                if (!addedProductIds.has(product.id)) {
                                    addMessage('', 'bot', product);
                                    addedProductIds.add(product.id);
                                    foundAny = true;
                                    await new Promise(r => setTimeout(r, 60));
                                }
                            }
                        }
                        // Nëse prapë asgjë, shto 3 bestsellers si sugjerim
                        if (!foundAny) {
                            const bestsellers = products.filter(p => p.bestseller).slice(0, 3);
                            for (const product of bestsellers) {
                                addMessage('', 'bot', product);
                                await new Promise(r => setTimeout(r, 60));
                            }
                        }
                    }

                    addQuickSuggestions();
                }

                function addQuickSuggestions() {
                    const oldReplies = messagesContainer.querySelectorAll('.quick-replies');
                    oldReplies.forEach(el => el.remove());

                    const suggestions = [
                        "🌸 Parfume për verë që zgjasin gjatë",
                        "💼 Aroma të lehta për zyrë",
                        "⭐ Më të shiturit (bestsellers)",
                        "🌙 Parfum romantik për mbrëmje",
                        "💰 Buxhet nën 6000 Lekë"
                    ];
                    const suggestionDiv = document.createElement('div');
                    suggestionDiv.className = 'quick-replies';
                    suggestions.forEach(sug => {
                        const btn = document.createElement('span');
                        btn.className = 'quick-reply';
                        btn.innerText = sug;
                        btn.onclick = () => {
                            chatInput.value = sug;
                            sendMessage();
                        };
                        suggestionDiv.appendChild(btn);
                    });
                    messagesContainer.appendChild(suggestionDiv);
                }

                function showWelcome() {
                    const welcomeText = "✨ **Mirësevjen në ERALL** ✨\n\nUnë jam asistenti yt për parfume luksoze. Më trego çfarë kërkoni dhe unë do të gjej aromën perfekte!\n\n💬 *Shembull: Dua parfum për verë që zgjat gjithë ditën*";
                    addMessage(welcomeText, 'bot');
                    addQuickSuggestions();
                }

                // Event Listeners
                floatBtn.addEventListener('click', () => {
                    widget.classList.add('open');
                    if (chatMessages.length === 0) showWelcome();
                });

                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    widget.classList.remove('open');
                });

                sendBtn.addEventListener('click', sendMessage);
                chatInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });

                window.viewProduct = function (productId) {
                    window.location.href = `product.html?id=${productId}`;
                };

                window.addToCartFromChat = function (productId) {
                    const productsAll = getProductsData();
                    const product = productsAll.find(p => p.id === productId);
                    if (product) {
                        let cart = JSON.parse(localStorage.getItem('aromexa-cart')) || [];
                        const existing = cart.find(item => item.id === productId);
                        if (existing) existing.quantity += 1;
                        else cart.push({ id: product.id, name: product.name, price: product.price, image: product.image, category: product.categoryDisplay, quantity: 1 });
                        localStorage.setItem('aromexa-cart', JSON.stringify(cart));
                        if (typeof updateCartCount === 'function') updateCartCount();
                        addMessage(`🛍️ **${product.name}** u shtua në shportë!`, 'bot');
                    }
                };
            })();
        </script>
    </body>

</html>
